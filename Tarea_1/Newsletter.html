<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="resources/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />
    <title>Join Our Newsletter</title>
    <link rel="stylesheet" href="Style/Style.css" />
  </head>
  <body>
    <main class="container">
      <div class="newsletter-card">
        <img src="resources/logo.svg" alt="Logo" class="logo" />
        
        <h1 class="title">Join our newsletter</h1>
        
        <p class="description">
          Keep up with our latest collections, exclusive deals, and special offers! 
          We introduce a new collection every week, so stay tuned to snag the 
          hottest items just for you.
        </p>
        
        <form class="newsletter-form">
          <input 
            type="email" 
            placeholder="Enter your email address" 
            class="email-input"
            required
          />
          <button type="submit" class="subscribe-btn">Subscribe now</button>
          <p class="privacy-text">
            Your email is 100% confidential and won't send you any spam.
          </p>
        </form>
      </div>
    </main>
  </body>
</html>
