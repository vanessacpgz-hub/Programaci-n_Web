<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      href="resources/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />
    <link rel="stylesheet" href="Styles/Styles.css" />
    <title>Contact Page</title>
  </head>
  <body>
    <header class="header">
      <img src="resources/Logo.svg" alt="Becv Logo" class="logo" />
    </header>

    <main class="main-content">
      <div class="hero-section">
        <h1 class="hero-title">Interested in our business pricing?</h1>
        <p class="hero-subtitle">
          Fill out the form to view details and we'll contact you as soon as possible.
        </p>
      </div>

      <form class="contact-form">
        <div class="form-row">
          <div class="form-group">
            <label for="name">Name</label>
            <input 
              type="text" 
              id="name" 
              name="name" 
              placeholder="Ethan Johnson"
              required
            />
          </div>

          <div class="form-group">
            <label for="email">Company Email</label>
            <input 
              type="email" 
              id="email" 
              name="email" 
              placeholder="ethan@johnson.com"
              required
            />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="company-size">Company Size</label>
            <select id="company-size" name="company-size" required>
              <option value="">Select size</option>
              <option value="1-10">1-10 employees</option>
              <option value="10-50">10-50 employees</option>
              <option value="50-100" selected>50-100 employees</option>
              <option value="100-500">100-500 employees</option>
              <option value="500+">500+ employees</option>
            </select>
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <select id="subject" name="subject" required>
              <option value="">Select subject</option>
              <option value="landing-pages" selected>Building Landing pages</option>
              <option value="web-design">Web Design</option>
              <option value="consulting">Consulting</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>

        <div class="form-group full-width">
          <label for="message">Message</label>
          <textarea 
            id="message" 
            name="message" 
            rows="6"
            placeholder="50-100 employees"
            required
          ></textarea>
        </div>

        <button type="submit" class="submit-btn">Contact Sales</button>
      </form>
    </main>
  </body>
</html>
